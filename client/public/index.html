<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Nexus</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --surface3: #252525;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #999;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.18);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.15);
      --radius: 18px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }

    /* ── Setup ── */
    #setup-screen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 28px;
    }
    .setup-box { width: 100%; max-width: 380px; }
    .setup-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
    .setup-tag { color: var(--muted2); font-size: 14px; margin-bottom: 36px; }
    .field-label { font-size: 12px; color: var(--muted2); margin-bottom: 6px; display: block; }
    input, select {
      width: 100%; padding: 13px 16px; background: var(--surface);
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      color: var(--text); font-size: 15px; margin-bottom: 14px;
      outline: none; -webkit-appearance: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: #1a1a1a; }
    .btn-primary {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius-sm); font-size: 15px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* ── App shell ── */
    #app-screen { display: none; height: 100vh; flex-direction: row; }

    /* ── Sidebar overlay (menu) ── */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 40; transition: opacity 0.2s;
    }
    #sidebar-overlay.show { display: block; }
    #sidebar {
      position: fixed; top: 0; left: -280px; bottom: 0; width: 280px;
      background: var(--surface); border-right: 1px solid var(--border2);
      z-index: 50; transition: left 0.25s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    #sidebar.open { left: 0; }
    .sidebar-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 18px; font-weight: 700; }
    .sidebar-sub { font-size: 12px; color: var(--muted2); margin-top: 2px; }
    .sidebar-section { padding: 14px 20px 8px; }
    .sidebar-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
    .sidebar-device {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s;
    }
    .sidebar-device:hover { background: var(--surface2); }
    .sd-icon { width: 34px; height: 34px; background: var(--surface3); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sd-name { font-size: 14px; font-weight: 500; }
    .sd-type { font-size: 12px; color: var(--muted2); }
    .sidebar-info { padding: 14px 20px; margin-top: auto; border-top: 1px solid var(--border); }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .info-label { color: var(--muted2); }
    .info-val { color: var(--text); font-weight: 500; }
    .trust-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid; }
    .trust-pill.trusted { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .trust-pill.guest { border-color: rgba(234,179,8,0.4); color: #eab308; }

    /* ── Main area ── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Conversations list ── */
    #conv-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .hamburger { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 20px; line-height: 1; }
    .topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

    .conv-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; cursor: pointer; transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .conv-item:hover, .conv-item.active { background: var(--surface); }
    .conv-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--surface3); display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 600; font-size: 15px; }
    .conv-last { font-size: 13px; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-time { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .conv-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); font-size: 14px; gap: 8px; padding: 40px; text-align: center; }
    .conv-empty-icon { font-size: 40px; }

    /* ── Chat screen ── */
    #chat-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .chat-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .back-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 22px; padding: 2px 6px; }
    .chat-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .chat-device-name { font-weight: 600; font-size: 16px; }
    .chat-device-sub { font-size: 12px; color: var(--muted2); }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 6px; }

    /* ── Bubbles ── */
    .bubble-row { display: flex; }
    .bubble-row.out { justify-content: flex-end; }
    .bubble-row.in { justify-content: flex-start; }
    .bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.45; word-break: break-word;
    }
    .bubble.out { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .bubble.in { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-time { font-size: 11px; opacity: 0.6; margin-top: 4px; }
    .bubble.out .bubble-time { text-align: right; }

    /* File bubble */
    .file-bubble {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 14px; max-width: 280px; cursor: pointer;
    }
    .file-bubble.out { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .file-bubble.in { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .file-icon { font-size: 28px; flex-shrink: 0; }
    .file-info { min-width: 0; }
    .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .file-size { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    .file-progress { height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .file-progress-fill { height: 100%; background: white; border-radius: 2px; transition: width 0.2s; }
    .file-dl { font-size: 12px; margin-top: 4px; opacity: 0.85; text-decoration: underline; cursor: pointer; }

    /* ── Compose bar ── */
    .compose {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 12px; border-top: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .compose-attach {
      width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .compose-attach:hover { background: var(--surface3); }
    .compose-input-wrap { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 9px 14px; min-height: 38px; display: flex; align-items: center; }
    .compose-input { background: none; border: none; outline: none; color: var(--text); font-size: 15px; width: 100%; resize: none; font-family: inherit; line-height: 1.4; max-height: 120px; overflow-y: auto; }
    .compose-input::placeholder { color: var(--muted); }
    .compose-send {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: var(--accent); color: white; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }
    .compose-send:hover { opacity: 0.88; }
    .compose-send:disabled { background: var(--surface3); opacity: 0.5; cursor: default; }

    /* ── Incoming modal ── */
    #incoming-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 60;
      align-items: flex-end; justify-content: center; padding: 16px;
    }
    #incoming-overlay.show { display: flex; }
    .incoming-sheet {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 20px; padding: 24px; width: 100%; max-width: 400px;
    }
    .incoming-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .incoming-info { font-size: 14px; color: var(--muted2); margin-bottom: 20px; line-height: 1.5; }
    .incoming-btns { display: flex; gap: 10px; }
    .btn-accept { flex: 1; padding: 13px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-reject { flex: 1; padding: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; }

    #file-input { display: none; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Setup -->
<div id="setup-screen">
  <div class="setup-box">
    <div class="setup-logo">Nexus</div>
    <div class="setup-tag">Local file sharing — fast &amp; private</div>
    <label class="field-label">Your name</label>
    <input id="device-name" placeholder="e.g. Amir's iPhone" autocomplete="off" />
    <label class="field-label">Device type</label>
    <select id="device-type">
      <option value="phone">📱 Phone</option>
      <option value="pc">💻 PC / Laptop</option>
      <option value="tablet">📲 Tablet</option>
      <option value="tv">📺 TV</option>
    </select>
    <label class="field-label">Room PIN <span style="color:var(--muted);font-weight:400">(optional)</span></label>
    <input id="room-pin" type="password" placeholder="Leave empty if none" />
    <button class="btn-primary" onclick="startNexus()">Join Room</button>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <div id="main">

    <!-- Conversations list -->
    <div id="conv-screen">
      <div class="topbar">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <span class="topbar-title">Nexus</span>
        <span class="online-dot" id="online-dot" style="display:none"></span>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="conv-empty">
          <div class="conv-empty-icon">📡</div>
          <div>Waiting for devices on your network…</div>
          <div style="font-size:12px;color:var(--muted)">Open Nexus on another device</div>
        </div>
      </div>
    </div>

    <!-- Chat screen -->
    <div id="chat-screen">
      <div class="chat-topbar">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div class="chat-avatar" id="chat-avatar">📱</div>
        <div>
          <div class="chat-device-name" id="chat-name">Device</div>
          <div class="chat-device-sub" id="chat-sub">phone</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="compose">
        <button class="compose-attach" onclick="document.getElementById('file-input').click()" title="Attach file">＋</button>
        <div class="compose-input-wrap">
          <textarea class="compose-input" id="compose-text" placeholder="Message" rows="1"
            oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        </div>
        <button class="compose-send" id="send-btn" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>

  </div>

  <!-- Sidebar -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Nexus</div>
      <div class="sidebar-sub" id="sidebar-room">Connecting…</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Devices in room</div>
      <div id="sidebar-devices"><div style="color:var(--muted);font-size:13px;padding:4px 0">No devices yet</div></div>
    </div>
    <div class="sidebar-info">
      <div class="info-row">
        <span class="info-label">Status</span>
        <span id="sidebar-trust" class="trust-pill guest">Guest</span>
      </div>
      <div class="info-row">
        <span class="info-label">My name</span>
        <span class="info-val" id="sidebar-myname">—</span>
      </div>
    </div>
  </div>

  <!-- Incoming file sheet -->
  <div id="incoming-overlay">
    <div class="incoming-sheet">
      <div class="incoming-title">Incoming file</div>
      <div class="incoming-info" id="incoming-info">Someone wants to send you a file.</div>
      <div class="incoming-btns">
        <button class="btn-accept" onclick="handleAccept()">Accept</button>
        <button class="btn-reject" onclick="handleReject()">Decline</button>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" multiple accept="*/*" />
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/droply.js"></script>
<script>
  const droply = new Droply();
  const deviceEmoji = { phone: '📱', pc: '💻', tablet: '📲', tv: '📺', unknown: '🖥️' };

  // State
  let myName = '';
  let selectedDeviceId = null;
  let pendingIncoming = null;
  // conversations: { [deviceId]: { device, messages: [] } }
  const conversations = new Map();
  // activeTransfers: { [transferId]: { bubbleId, direction } }
  const activeTransfers = new Map();

  function fmt(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
  }
  function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fileIcon(name) {
    const ext = (name||'').split('.').pop().toLowerCase();
    if (['mp4','mov','avi','mkv','webm'].includes(ext)) return '🎬';
    if (['jpg','jpeg','png','gif','webp','heic'].includes(ext)) return '🖼️';
    if (['mp3','wav','aac','m4a','ogg'].includes(ext)) return '🎵';
    if (['pdf'].includes(ext)) return '📄';
    if (['zip','rar','7z','tar','gz'].includes(ext)) return '🗜️';
    return '📎';
  }

  async function startNexus() {
    myName = document.getElementById('device-name').value.trim() || 'Unknown Device';
    const type = document.getElementById('device-type').value;
    const pin = document.getElementById('room-pin').value.trim() || null;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('sidebar-myname').textContent = myName;
    await droply.connect(myName, type, pin);
  }

  droply.on('ready', ({ subnet, trusted, devices }) => {
    document.getElementById('online-dot').style.display = 'inline-block';
    document.getElementById('sidebar-room').textContent = 'Room: ' + subnet;
    const tp = document.getElementById('sidebar-trust');
    tp.textContent = trusted ? 'Trusted' : 'Guest';
    tp.className = 'trust-pill ' + (trusted ? 'trusted' : 'guest');
    devices.forEach(ensureConversation);
    renderConvList();
    renderSidebarDevices();
  });

  droply.on('device-joined', (device) => {
    ensureConversation(device);
    renderConvList();
    renderSidebarDevices();
  });

  droply.on('device-left', ({ id }) => {
    renderConvList();
    renderSidebarDevices();
  });

  function ensureConversation(device) {
    if (!conversations.has(device.id)) {
      conversations.set(device.id, { device, messages: [] });
    }
  }

  function renderConvList() {
    const el = document.getElementById('conv-list');
    const devs = [...droply.devices.values()];
    if (!devs.length) {
      el.innerHTML = `<div class="conv-empty"><div class="conv-empty-icon">📡</div><div>Waiting for devices on your network…</div><div style="font-size:12px;color:var(--muted)">Open Nexus on another device</div></div>`;
      return;
    }
    el.innerHTML = devs.map(d => {
      const conv = conversations.get(d.id);
      const msgs = conv ? conv.messages : [];
      const last = msgs.length ? msgs[msgs.length-1] : null;
      const lastText = last ? (last.type === 'file' ? '📎 ' + last.fileName : last.text) : 'Tap to send files or messages';
      const lastTime = last ? fmtTime(last.ts) : '';
      return `<div class="conv-item ${selectedDeviceId === d.id ? 'active' : ''}" onclick="openChat('${d.id}')">
        <div class="conv-avatar">${deviceEmoji[d.type]||'🖥️'}</div>
        <div class="conv-info">
          <div class="conv-name">${esc(d.name)}</div>
          <div class="conv-last">${esc(lastText)}</div>
        </div>
        ${lastTime ? `<div class="conv-time">${lastTime}</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderSidebarDevices() {
    const el = document.getElementById('sidebar-devices');
    const devs = [...droply.devices.values()];
    if (!devs.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:4px 0">No devices yet</div>'; return; }
    el.innerHTML = devs.map(d => `
      <div class="sidebar-device" onclick="openChat('${d.id}'); closeSidebar();">
        <div class="sd-icon">${deviceEmoji[d.type]||'🖥️'}</div>
        <div><div class="sd-name">${esc(d.name)}</div><div class="sd-type">${d.type}</div></div>
      </div>`).join('');
  }

  function openChat(deviceId) {
    selectedDeviceId = deviceId;
    const conv = conversations.get(deviceId);
    if (!conv) return;
    const d = conv.device;
    document.getElementById('chat-avatar').textContent = deviceEmoji[d.type]||'🖥️';
    document.getElementById('chat-name').textContent = d.name;
    document.getElementById('chat-sub').textContent = d.type;
    document.getElementById('conv-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('send-btn').disabled = false;
    renderMessages(deviceId);
    renderConvList();
  }

  function goBack() {
    selectedDeviceId = null;
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('conv-screen').style.display = 'flex';
    document.getElementById('send-btn').disabled = true;
    renderConvList();
  }

  function renderMessages(deviceId) {
    const conv = conversations.get(deviceId);
    if (!conv) return;
    const el = document.getElementById('chat-messages');
    el.innerHTML = conv.messages.map(m => buildBubble(m)).join('');
    el.scrollTop = el.scrollHeight;
  }

  function buildBubble(m) {
    const dir = m.direction;
    if (m.type === 'text') {
      return `<div class="bubble-row ${dir}">
        <div class="bubble ${dir}">${esc(m.text)}<div class="bubble-time">${fmtTime(m.ts)}</div></div>
      </div>`;
    }
    if (m.type === 'file') {
      const dlBtn = m.url ? `<div class="file-dl" onclick="downloadFile('${m.url}','${esc(m.fileName)}')">Download</div>` : '';
      const prog = m.progress < 100 ? `<div class="file-progress"><div class="file-progress-fill" id="prog-${m.id}" style="width:${m.progress}%"></div></div>` : '';
      return `<div class="bubble-row ${dir}" id="bubble-${m.id}">
        <div class="file-bubble ${dir}">
          <div class="file-icon">${fileIcon(m.fileName)}</div>
          <div class="file-info">
            <div class="file-name">${esc(m.fileName)}</div>
            <div class="file-size">${fmt(m.fileSize)}${m.progress < 100 ? ' · ' + m.progress + '%' : ''}</div>
            ${prog}${dlBtn}
          </div>
        </div>
      </div>`;
    }
    return '';
  }

  function addMessage(deviceId, msg) {
    const conv = conversations.get(deviceId);
    if (!conv) return;
    conv.messages.push(msg);
    if (selectedDeviceId === deviceId) {
      const el = document.getElementById('chat-messages');
      el.insertAdjacentHTML('beforeend', buildBubble(msg));
      el.scrollTop = el.scrollHeight;
    }
    renderConvList();
  }

  function updateFileBubble(transferId, progress, url) {
    const info = activeTransfers.get(transferId);
    if (!info) return;
    const prog = document.getElementById('prog-' + info.msgId);
    if (prog) prog.style.width = progress + '%';
    const bubble = document.getElementById('bubble-' + info.msgId);
    if (bubble) {
      const sizeEl = bubble.querySelector('.file-size');
      if (sizeEl) {
        const base = sizeEl.textContent.split(' · ')[0];
        sizeEl.textContent = progress < 100 ? base + ' · ' + progress + '%' : base;
      }
    }
    // Update message in conv
    const conv = conversations.get(info.deviceId);
    if (conv) {
      const msg = conv.messages.find(m => m.id === info.msgId);
      if (msg) {
        msg.progress = progress;
        if (url) { msg.url = url; msg.progress = 100; }
      }
    }
    if (progress >= 100 && url) {
      if (bubble) {
        const fi = bubble.querySelector('.file-info');
        if (fi && !fi.querySelector('.file-dl')) {
          fi.insertAdjacentHTML('beforeend', `<div class="file-dl" onclick="downloadFile('${url}','${esc(info.fileName)}')">Download</div>`);
        }
        const p = bubble.querySelector('.file-progress');
        if (p) p.remove();
      }
    }
  }

  function downloadFile(url, name) {
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
  }

  // Send text message
  function sendMessage() {
    if (!selectedDeviceId) return;
    const el = document.getElementById('compose-text');
    const text = el.value.trim();
    if (!text) return;
    el.value = '';
    autoResize(el);
    const msg = { id: crypto.randomUUID(), type: 'text', direction: 'out', text, ts: Date.now() };
    addMessage(selectedDeviceId, msg);
    // Text messages go via socket for now (simple approach)
    droply.socket.emit('text:send', { targetId: selectedDeviceId, text, msgId: msg.id });
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    document.getElementById('send-btn').disabled = !el.value.trim() && !selectedDeviceId;
    if (selectedDeviceId) document.getElementById('send-btn').disabled = false;
  }

  // Receive text
  droply.socket && droply.socket.on('text:receive', ({ fromId, text, msgId }) => {
    ensureConversation(droply.devices.get(fromId) || { id: fromId, name: 'Unknown', type: 'unknown' });
    addMessage(fromId, { id: msgId, type: 'text', direction: 'in', text, ts: Date.now() });
  });

  // We need to hook text messages after connect
  droply.on('ready', () => {
    droply.socket.on('text:receive', ({ fromId, text, msgId }) => {
      const dev = droply.devices.get(fromId);
      if (dev) ensureConversation(dev);
      addMessage(fromId, { id: msgId||crypto.randomUUID(), type: 'text', direction: 'in', text, ts: Date.now() });
    });
  });

  // File attach
  document.getElementById('file-input').addEventListener('change', e => {
    if (!selectedDeviceId) return;
    [...e.target.files].forEach(f => sendFile(f));
    e.target.value = '';
  });

  async function sendFile(file) {
    const msgId = crypto.randomUUID();
    const msg = { id: msgId, type: 'file', direction: 'out', fileName: file.name, fileSize: file.size, progress: 0, url: null, ts: Date.now() };
    addMessage(selectedDeviceId, msg);
    const transferId = await droply.sendFile(selectedDeviceId, file);
    activeTransfers.set(transferId, { msgId, deviceId: selectedDeviceId, fileName: file.name });
  }

  // Incoming file
  droply.on('transfer-incoming', ({ fromId, transferMeta }) => {
    pendingIncoming = { fromId, transferMeta };
    const dev = droply.devices.get(fromId);
    document.getElementById('incoming-info').textContent =
      `${dev ? dev.name : 'Someone'} wants to send "${transferMeta.fileName}" (${fmt(transferMeta.fileSize)})`;
    document.getElementById('incoming-overlay').classList.add('show');
  });

  function handleAccept() {
    if (!pendingIncoming) return;
    const { fromId, transferMeta } = pendingIncoming;
    droply.acceptTransfer(fromId, transferMeta.transferId);
    document.getElementById('incoming-overlay').classList.remove('show');
    // Add incoming bubble
    const dev = droply.devices.get(fromId);
    if (dev) ensureConversation(dev);
    const msgId = transferMeta.transferId;
    addMessage(fromId, { id: msgId, type: 'file', direction: 'in', fileName: transferMeta.fileName, fileSize: transferMeta.fileSize, progress: 0, url: null, ts: Date.now() });
    activeTransfers.set(transferMeta.transferId, { msgId, deviceId: fromId, fileName: transferMeta.fileName });
    pendingIncoming = null;
  }

  function handleReject() {
    if (!pendingIncoming) return;
    droply.rejectTransfer(pendingIncoming.fromId, pendingIncoming.transferMeta.transferId);
    document.getElementById('incoming-overlay').classList.remove('show');
    pendingIncoming = null;
  }

  droply.on('transfer-progress', ({ transferId, progress }) => {
    updateFileBubble(transferId, progress, null);
  });

  droply.on('transfer-complete', ({ transferId, direction, url, fileName }) => {
    updateFileBubble(transferId, 100, url || null);
  });

  // Sidebar
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
