<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Droply</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #707070;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.15);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.15);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.15);
      --radius: 10px;
      --radius-sm: 6px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    #setup-screen, #app-screen { min-height: 100vh; }

    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .setup-box {
      width: 100%;
      max-width: 400px;
    }

    .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .tagline { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

    input, select {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input:focus, select:focus { border-color: var(--accent); }

    select option { background: #1a1a1a; }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.8; }
    .btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); font-weight: 500; }
    .btn.danger { background: var(--red); }
    .btn.sm { width: auto; padding: 7px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); }
    .btn.green { background: var(--green); }

    /* ── App layout ── */
    #app-screen { display: none; flex-direction: column; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-size: 20px; font-weight: 700; }
    .pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .pill.trusted { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .pill.guest { border-color: rgba(234,179,8,0.4); color: #eab308; }

    .subnet-label { font-size: 12px; color: var(--muted); }

    /* ── Main content ── */
    .content { flex: 1; padding: 20px; max-width: 700px; width: 100%; margin: 0 auto; }

    /* ── Section ── */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* ── Drop zone ── */
    #dropzone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 24px;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-text { font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .drop-hint { font-size: 13px; color: var(--muted); }
    #file-input { display: none; }

    /* ── Device list ── */
    .device-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      gap: 12px;
    }
    .device-item:hover { border-color: var(--border2); }
    .device-item.selected { border-color: var(--accent); background: var(--accent-dim); }
    .device-icon-wrap {
      width: 38px; height: 38px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .device-info { flex: 1; min-width: 0; }
    .device-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-sub { font-size: 12px; color: var(--muted); }
    .device-send-btn {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .device-send-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

    .empty-state { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }

    /* ── Transfer items ── */
    .transfer-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      margin-bottom: 8px;
    }
    .transfer-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .transfer-name { font-weight: 600; font-size: 14px; word-break: break-all; flex: 1; }
    .transfer-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .transfer-dir {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .dir-in { background: var(--green-dim); color: var(--green); }
    .dir-out { background: var(--accent-dim); color: var(--accent); }
    .dir-done { background: rgba(255,255,255,0.06); color: var(--muted); }

    .progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
    .fill-blue { background: var(--accent); }
    .fill-green { background: var(--green); }

    .transfer-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── History ── */
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }
    .history-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .h-in { background: var(--green-dim); }
    .h-out { background: var(--accent-dim); }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 12px; color: var(--muted); }
    .history-dl { background: transparent; border: 1px solid var(--border2); color: var(--text); padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; text-decoration: none; }
    .history-dl:hover { background: var(--surface2); }

    /* ── Incoming modal (full-page overlay, no fixed) ── */
    #modal-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
    }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .modal p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns .btn { margin: 0; }

    /* ── PIN section ── */
    .pin-row { display: flex; gap: 8px; }
    .pin-row input { margin-bottom: 0; flex: 1; }
    .pin-row .btn { width: auto; padding: 11px 16px; }

    /* ── Responsive ── */
    @media (min-width: 600px) {
      .content { padding: 28px 24px; }
      #dropzone { padding: 48px 20px; }
    }

    /* ── Wrap everything in relative for modal ── */
    #app-screen { position: relative; }
  </style>
</head>
<body>

<!-- Setup -->
<div id="setup-screen">
  <div class="setup-box">
    <div class="logo">Droply</div>
    <div class="tagline">Fast local file transfer — no internet needed</div>

    <label for="device-name">Your name</label>
    <input id="device-name" placeholder="e.g. Amir's iPhone" autocomplete="off" />

    <label for="device-type">Device type</label>
    <select id="device-type">
      <option value="phone">Phone</option>
      <option value="pc">PC / Laptop</option>
      <option value="tablet">Tablet</option>
      <option value="tv">TV</option>
    </select>

    <label for="room-pin">Room PIN <span style="color:var(--muted);font-weight:400">(optional)</span></label>
    <input id="room-pin" type="password" placeholder="Enter PIN if room has one" />

    <button class="btn" onclick="startDrofly()">Join Room</button>
  </div>
</div>

<!-- App -->
<div id="app-screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Droply</span>
      <span id="trust-pill" class="pill">Guest</span>
    </div>
    <span id="subnet-label" class="subnet-label"></span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Drop zone -->
    <div id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">⬆</div>
      <div class="drop-text">Drop files here or tap to select</div>
      <div class="drop-hint" id="drop-hint">Select a device below first</div>
    </div>
    <input type="file" id="file-input" multiple />

    <!-- Devices -->
    <div class="section">
      <div class="section-title">Devices in room</div>
      <div id="device-list"><div class="empty-state">Waiting for other devices…</div></div>
    </div>

    <!-- Active transfers -->
    <div class="section" id="active-section" style="display:none">
      <div class="section-title">Active transfers</div>
      <div id="active-transfers"></div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-title">History</div>
      <div id="history-list"><div class="empty-state">No transfers yet</div></div>
    </div>

    <!-- Settings -->
    <div class="section" id="pin-section" style="display:none">
      <div class="section-title">Room PIN</div>
      <div class="pin-row">
        <input id="pin-input" type="password" placeholder="Set a PIN for this room" />
        <button class="btn" onclick="setPin()">Set</button>
      </div>
    </div>

  </div>

  <!-- Incoming modal (inside app-screen so no fixed needed) -->
  <div id="modal-overlay">
    <div class="modal">
      <h3>Incoming file</h3>
      <p id="modal-info">Someone wants to send you a file.</p>
      <div class="modal-btns">
        <button class="btn green" onclick="handleAccept()">Accept</button>
        <button class="btn secondary" onclick="handleReject()">Reject</button>
      </div>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/droply.js"></script>
<script>
  const droply = new Droply();
  let selectedDevice = null;
  let pendingIncoming = null;
  const activeTransfers = new Map();

  const deviceEmoji = { phone: '📱', pc: '💻', tablet: '📲', tv: '📺', unknown: '🖥️' };

  function fmt(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function startDrofly() {
    const name = document.getElementById('device-name').value.trim() || 'Unknown Device';
    const type = document.getElementById('device-type').value;
    const pin = document.getElementById('room-pin').value.trim() || null;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('app-screen').style.flexDirection = 'column';
    droply.connect(name, type, pin);
  }

  droply.on('ready', ({ subnet, trusted, devices }) => {
    document.getElementById('subnet-label').textContent = 'Network: ' + subnet;
    const pill = document.getElementById('trust-pill');
    pill.textContent = trusted ? 'Trusted' : 'Guest';
    pill.className = 'pill ' + (trusted ? 'trusted' : 'guest');
    if (trusted) document.getElementById('pin-section').style.display = 'block';
    renderDevices(devices);
    renderHistory();
  });

  droply.on('device-joined', () => renderDevices([...droply.devices.values()]));
  droply.on('device-left', ({ id }) => {
    if (selectedDevice === id) { selectedDevice = null; updateDropHint(); }
    renderDevices([...droply.devices.values()]);
  });

  function renderDevices(devices) {
    const el = document.getElementById('device-list');
    if (!devices.length) {
      el.innerHTML = '<div class="empty-state">No other devices in this room</div>';
      return;
    }
    el.innerHTML = devices.map(d => `
      <div class="device-item ${selectedDevice === d.id ? 'selected' : ''}" onclick="selectDevice('${d.id}')">
        <div class="device-icon-wrap">${deviceEmoji[d.type] || '🖥️'}</div>
        <div class="device-info">
          <div class="device-name">${esc(d.name)}</div>
          <div class="device-sub">${d.type}${d.trusted ? ' · trusted' : ' · guest'}</div>
        </div>
        <button class="device-send-btn" onclick="event.stopPropagation(); triggerSend('${d.id}')">Send</button>
      </div>
    `).join('');
  }

  function selectDevice(id) {
    selectedDevice = id;
    renderDevices([...droply.devices.values()]);
    updateDropHint();
  }

  function updateDropHint() {
    const hint = document.getElementById('drop-hint');
    if (selectedDevice && droply.devices.has(selectedDevice)) {
      hint.textContent = 'Sending to: ' + droply.devices.get(selectedDevice).name;
    } else {
      hint.textContent = 'Select a device below first';
    }
  }

  function triggerSend(id) {
    selectedDevice = id;
    updateDropHint();
    document.getElementById('file-input').click();
  }

  function setPin() {
    const pin = document.getElementById('pin-input').value.trim();
    if (pin) { droply.setPin(pin); document.getElementById('pin-input').value = ''; }
  }

  // File input
  document.getElementById('file-input').addEventListener('change', e => {
    if (!selectedDevice) return alert('Select a device first');
    [...e.target.files].forEach(f => droply.sendFile(selectedDevice, f));
    e.target.value = '';
  });

  // Drag & drop
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (!selectedDevice) return alert('Select a device first');
    [...e.dataTransfer.files].forEach(f => droply.sendFile(selectedDevice, f));
  });

  // Incoming
  droply.on('transfer-incoming', ({ fromId, transferMeta }) => {
    pendingIncoming = { fromId, transferMeta };
    const dev = droply.devices.get(fromId);
    document.getElementById('modal-info').textContent =
      `${dev ? dev.name : 'Unknown'} wants to send you "${transferMeta.fileName}" (${fmt(transferMeta.fileSize)})`;
    document.getElementById('modal-overlay').classList.add('show');
  });

  function handleAccept() {
    if (!pendingIncoming) return;
    droply.acceptTransfer(pendingIncoming.fromId, pendingIncoming.transferMeta.transferId);
    document.getElementById('modal-overlay').classList.remove('show');
    pendingIncoming = null;
  }

  function handleReject() {
    if (!pendingIncoming) return;
    droply.rejectTransfer(pendingIncoming.fromId, pendingIncoming.transferMeta.transferId);
    document.getElementById('modal-overlay').classList.remove('show');
    pendingIncoming = null;
  }

  // Transfer events
  droply.on('transfer-started', ({ transferId, direction }) => {
    const t = droply.transfers.get(transferId);
    const name = direction === 'out' ? t?.file?.name : t?.meta?.fileName;
    const size = direction === 'out' ? t?.file?.size : t?.meta?.fileSize;
    activeTransfers.set(transferId, { name, size, progress: 0, direction, paused: false, url: null, done: false });
    renderActive();
  });

  droply.on('transfer-progress', ({ transferId, progress }) => {
    const t = activeTransfers.get(transferId);
    if (t) { t.progress = progress; renderActive(); }
  });

  droply.on('transfer-paused', ({ transferId }) => {
    const t = activeTransfers.get(transferId);
    if (t) { t.paused = true; renderActive(); }
  });

  droply.on('transfer-resumed', ({ transferId }) => {
    const t = activeTransfers.get(transferId);
    if (t) { t.paused = false; renderActive(); }
  });

  droply.on('transfer-complete', ({ transferId, direction, url, fileName }) => {
    const t = activeTransfers.get(transferId);
    if (t) { t.progress = 100; t.done = true; if (url) t.url = url; renderActive(); }
    renderHistory();
    setTimeout(() => { activeTransfers.delete(transferId); renderActive(); }, 6000);
  });

  function renderActive() {
    const section = document.getElementById('active-section');
    const el = document.getElementById('active-transfers');
    if (!activeTransfers.size) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    el.innerHTML = [...activeTransfers.entries()].map(([id, t]) => `
      <div class="transfer-item">
        <div class="transfer-top">
          <div style="flex:1;min-width:0">
            <div class="transfer-name">${esc(t.name || 'File')}</div>
            <div class="transfer-meta">${fmt(t.size || 0)} · ${t.paused ? 'Paused' : t.done ? 'Done' : (t.direction === 'out' ? 'Sending' : 'Receiving')} · ${t.progress}%</div>
          </div>
          <span class="transfer-dir ${t.done ? 'dir-done' : t.direction === 'in' ? 'dir-in' : 'dir-out'}">
            ${t.done ? 'Done' : t.direction === 'in' ? '↓ In' : '↑ Out'}
          </span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${t.done ? 'fill-green' : 'fill-blue'}" style="width:${t.progress}%"></div>
        </div>
        <div class="transfer-actions">
          ${!t.done && t.direction === 'out' ? (
            t.paused
              ? `<button class="btn sm green" onclick="droply.resumeTransfer('${id}')">Resume</button>`
              : `<button class="btn sm secondary" onclick="droply.pauseTransfer('${id}')">Pause</button>`
          ) : ''}
          ${t.done && t.url ? `<a href="${t.url}" download="${esc(t.name)}"><button class="btn sm">Download</button></a>` : ''}
          ${t.done && !t.url ? '<span style="color:var(--green);font-size:13px">✓ Sent successfully</span>' : ''}
        </div>
      </div>
    `).join('');
  }

  function renderHistory() {
    const el = document.getElementById('history-list');
    const history = droply.getHistory();
    if (!history.length) { el.innerHTML = '<div class="empty-state">No transfers yet</div>'; return; }
    el.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="history-icon ${h.direction === 'in' ? 'h-in' : 'h-out'}">${h.direction === 'in' ? '↓' : '↑'}</div>
        <div class="history-info">
          <div class="history-name">${esc(h.fileName)}</div>
          <div class="history-meta">${fmt(h.fileSize)} · ${fmtTime(h.timestamp)}</div>
        </div>
        ${h.url ? `<a href="${h.url}" download="${esc(h.fileName)}" class="history-dl">↓</a>` : ''}
      </div>
    `).join('');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
